/* dim layer so reactive lights pop; eases up near cursor */
.dimmer{position:absolute;inset:0;z-index:2;background:rgba(3,4,12,0.0);pointer-events:none;transition:background .3s}

/* REACTIVE LIGHT OVERLAYS — one glow per real lamp */
.lights{position:absolute;inset:0;z-index:3;pointer-events:none;mix-blend-mode:screen}
.glow{
  position:absolute;border-radius:50%;
  transform:translate(-50%,-50%) scale(1);
  filter:blur(14px);
  opacity:0;
  will-change:opacity,transform;
}
/* volumetric beam shooting down from each lamp */
.beam{
  position:absolute;top:0;
  transform-origin:top center;
  mix-blend-mode:screen;
  opacity:0;
  pointer-events:none;
  will-change:opacity,transform;
}

/* HAZE / god-ray sweep that follows cursor */
.haze{position:absolute;inset:0;z-index:4;pointer-events:none;mix-blend-mode:screen;opacity:.0;transition:opacity .4s}

/* particle dust */
#dust{position:absolute;inset:0;z-index:5;pointer-events:none;mix-blend-mode:screen}

/* cursor light — soft glow that trails the pointer */
.cursor-glow{
  position:absolute;width:340px;height:340px;border-radius:50%;z-index:6;
  background:radial-gradient(circle, rgba(150,190,255,0.18), rgba(150,190,255,0.05) 40%, transparent 70%);
  transform:translate(-50%,-50%);pointer-events:none;mix-blend-mode:screen;
  opacity:0;transition:opacity .3s;
}

/* VIGNETTE */
.vignette{position:absolute;inset:0;z-index:7;pointer-events:none;
  background:radial-gradient(ellipse 90% 85% at 50% 42%, transparent 55%, rgba(0,0,0,0.5) 100%)}

/* TITLE */
.title-block{position:absolute;z-index:8;right:5.5%;top:54%;transform:translateY(-50%);text-align:right;pointer-events:none;
  text-shadow:0 6px 40px rgba(0,0,0,0.9)}
.title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(64px,11.5vw,190px);line-height:.88;letter-spacing:.03em;color:#fff;
  filter:drop-shadow(0 0 50px rgba(120,160,255,0.35))}
.title .x{background:linear-gradient(135deg,#7aa8ff,#b07aff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tagline{font-size:clamp(13px,1.7vw,27px);font-weight:400;letter-spacing:.3em;color:rgba(255,255,255,0.92);margin-top:20px;text-transform:uppercase}
.subtag{font-size:clamp(9px,1vw,15px);font-weight:300;letter-spacing:.26em;color:rgba(255,255,255,0.5);margin-top:12px;text-transform:uppercase}

.hint{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);z-index:9;font-size:11px;letter-spacing:.28em;text-transform:uppercase;
  color:rgba(255,255,255,0.45);pointer-events:none;animation:hp 3.2s ease-in-out infinite}
@keyframes hp{0%,100%{opacity:.25}50%{opacity:.65}}
</style>
</head>
<body>
<div class="hero" id="hero">
  <div class="scene" id="scene">
    <div class="bg"></div>
    <div class="dimmer" id="dimmer"></div>
    <div class="lights" id="lights"></div>
    <div class="haze" id="haze"></div>
    <canvas id="dust"></canvas>
  </div>
  <div class="cursor-glow" id="cursorGlow"></div>
  <div class="vignette"></div>

  <div class="title-block">
    <div class="title">MV<span class="x">X</span>P</div>
    <div class="tagline">Create. Play. Perform. Instantly.</div>
    <div class="subtag">AI-Orchestrated Music for Everyone</div>
  </div>

  <div class="hint">Move your cursor across the stage</div>
</div>

<script>
var LAMPS = [[9.6, 6.5, "#f6feff", "white"], [15.0, 8.0, "#ffcaa0", "warm"], [23.0, 9.0, "#ffb888", "warm"], [27.6, 7.5, "#ecfdfb", "white"], [39.9, 8.5, "#ff7a4a", "warm"], [44.1, 7.0, "#dbf8fd", "cool"], [48.2, 8.0, "#f7fdfe", "white"], [52.4, 9.0, "#fffedb", "warm"], [56.5, 6.5, "#fdfdff", "white"], [60.7, 8.5, "#9cb0ff", "cool"], [64.8, 9.5, "#ff8c4a", "warm"], [69.0, 8.0, "#fff7a9", "warm"], [73.1, 7.5, "#fcffff", "white"], [85.6, 9.0, "#bfe4f5", "cool"], [89.7, 8.5, "#5fbee8", "cool"]];
var hero=document.getElementById('hero'), scene=document.getElementById('scene'),
    lightsEl=document.getElementById('lights'), haze=document.getElementById('haze'),
    dimmer=document.getElementById('dimmer'), cursorGlow=document.getElementById('cursorGlow');

// Build a reactive glow + beam for each detected lamp
var glows=[];
for(var i=0;i<LAMPS.length;i++){
  var L=LAMPS[i], col=L[2];
  // glow halo on the lamp itself
  var g=document.createElement('div');
  g.className='glow';
  var size=90+Math.random()*40;
  g.style.width=size+'px'; g.style.height=size+'px';
  g.style.left=L[0]+'%'; g.style.top=L[1]+'%';
  g.style.background='radial-gradient(circle, '+col+' 0%, '+col+'aa 30%, transparent 70%)';
  lightsEl.appendChild(g);

  // beam going downward
  var b=document.createElement('div');
  b.className='beam';
  var bw=70+Math.random()*40;
  b.style.width=bw+'px';
  b.style.height='78%';
  b.style.left=L[0]+'%';
  b.style.marginLeft=(-bw/2)+'px';
  b.style.background='linear-gradient(180deg, '+col+'cc 0%, '+col+'44 28%, transparent 80%)';
  b.style.clipPath='polygon(40% 0, 60% 0, 100% 100%, 0% 100%)';
  b.style.filter='blur(10px)';
  lightsEl.appendChild(b);

  glows.push({g:g,b:b,x:L[0]/100,y:L[1]/100,phase:Math.random()*Math.PI*2,tone:L[3]});
}

// cursor + parallax state
var mx=0.5,my=0.4,tx=0.5,ty=0.4,lastMove=Date.now(),idle=false,t=0;
hero.addEventListener('mousemove',function(e){
  var r=hero.getBoundingClientRect();
  tx=(e.clientX-r.left)/r.width; ty=(e.clientY-r.top)/r.height;
  lastMove=Date.now(); idle=false;
  cursorGlow.style.opacity='1';
  cursorGlow.style.left=e.clientX+'px'; cursorGlow.style.top=e.clientY+'px';
});
hero.addEventListener('mouseleave',function(){cursorGlow.style.opacity='0'});

// dust
var dust=document.getElementById('dust'), dctx=dust.getContext('2d');
function sz(){dust.width=hero.clientWidth;dust.height=hero.clientHeight}
sz(); window.addEventListener('resize',sz);
var motes=[];
for(var i=0;i<60;i++)motes.push({x:Math.random(),y:Math.random(),vy:-0.00015-Math.random()*0.0004,vx:(Math.random()-0.5)*0.00018,r:Math.random()*1.6+0.3,a:Math.random()*0.4+0.08,ph:Math.random()*6.28});

function loop(){
  t+=0.016;
  if(Date.now()-lastMove>4500)idle=true;
  if(idle){ tx=0.5+Math.sin(t*0.35)*0.34; ty=0.42+Math.cos(t*0.24)*0.12; cursorGlow.style.opacity='0'; }

  mx+=(tx-mx)*0.07; my+=(ty-my)*0.07;
  var px=mx-0.5, py=my-0.5;

  // PARALLAX on whole scene (image + lights move together, subtle)
  scene.style.transform='translate('+(px*-26)+'px,'+(py*-16)+'px) scale(1.05)';

  // dimmer eases up so cursor area feels spotlit
  dimmer.style.background='rgba(3,4,12,'+(0.18*(1-Math.abs(py)*0.5))+')';

  // each lamp reacts: brighter & beam stronger when cursor is near its x
  for(var i=0;i<glows.length;i++){
    var o=glows[i]; o.phase+=0.012;
    var near=1-Math.min(1,Math.abs(o.x-mx)*2.0);
    var breathe=0.5+0.5*Math.sin(o.phase*1.4);
    var op=0.25+near*0.6+breathe*0.12;
    var scale=1+near*0.5+breathe*0.1;
    o.g.style.opacity=op.toFixed(2);
    o.g.style.transform='translate(-50%,-50%) scale('+scale.toFixed(2)+')';
    // beam tilts toward cursor and brightens with proximity
    var tilt=(mx-o.x)*40;
    var beamOp=0.12+near*0.5+breathe*0.06;
    o.b.style.opacity=beamOp.toFixed(2);
    o.b.style.transform='rotate('+tilt.toFixed(1)+'deg)';
  }

  // haze god-ray follows cursor x
  haze.style.opacity=(0.15+Math.abs(0.5-my)*0.1).toFixed(2);
  haze.style.background='radial-gradient(ellipse 40% 90% at '+(mx*100)+'% 0%, rgba(180,200,255,0.12), transparent 60%)';

  // dust
  dctx.clearRect(0,0,dust.width,dust.height);
  for(var i=0;i<motes.length;i++){
    var m=motes[i]; m.y+=m.vy; m.x+=m.vx; m.ph+=0.02;
    if(m.y<0){m.y=1;m.x=Math.random()}
    var fl=m.a*(0.55+0.45*Math.sin(m.ph));
    var dx=m.x-mx,dy=m.y-my,nr=1-Math.min(1,Math.sqrt(dx*dx+dy*dy)*2.6);
    dctx.beginPath();
    dctx.arc(m.x*dust.width,m.y*dust.height,m.r*(1+nr*1.2),0,6.28);
    dctx.fillStyle='rgba(255,'+(225+Math.floor(nr*30))+','+(190+Math.floor(nr*60))+','+(fl+nr*0.5)+')';
    dctx.fill();
  }
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
