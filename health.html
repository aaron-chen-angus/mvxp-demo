<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MVXP — Beyond Music. Building Healthier Communities.</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#04050b;
    --text:#eaf0fb;
    --muted:#94a1bd;
    --cyan:#3ad6ef;
    --cyan-2:#3b82f6;
    --amber:#f6b73c;
    --amber-2:#e98a1e;
    --violet:#b274ff;
    --violet-2:#7c3aed;
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}

  .mvxp{
    position:relative;
    min-height:100vh;
    width:100%;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:clamp(1.1rem,2.4vh,2.2rem);
    padding:clamp(1.4rem,3vh,2.6rem) clamp(1.2rem,3vw,3rem);
    isolation:isolate;
  }

  /* ---------- Atmosphere ---------- */
  .mvxp__bg{
    position:absolute;inset:0;z-index:-3;
    background:
      radial-gradient(120% 90% at 50% -10%, #0e1730 0%, #070b18 45%, var(--bg) 100%),
      radial-gradient(60% 50% at 50% 62%, rgba(28,52,110,.35), transparent 70%);
  }
  .mvxp__grid{
    position:absolute;inset:0;z-index:-3;opacity:.35;
    background-image:
      linear-gradient(rgba(90,140,220,.06) 1px,transparent 1px),
      linear-gradient(90deg,rgba(90,140,220,.06) 1px,transparent 1px);
    background-size:54px 54px;
    mask:radial-gradient(80% 70% at 50% 45%, #000 30%, transparent 90%);
    -webkit-mask:radial-gradient(80% 70% at 50% 45%, #000 30%, transparent 90%);
  }
  .mvxp__spotlights{position:absolute;inset:0;z-index:-2;pointer-events:none}
  .mvxp__spotlights span{
    position:absolute;top:54%;width:30vw;max-width:520px;aspect-ratio:1;
    border-radius:50%;filter:blur(70px);opacity:.5;transform:translateY(-50%);
    animation:breathe 7s ease-in-out infinite;
  }
  .mvxp__spotlights .s1{left:8%;background:radial-gradient(circle,rgba(58,214,239,.55),transparent 70%);animation-delay:0s}
  .mvxp__spotlights .s2{left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(246,183,60,.5),transparent 70%);animation-delay:1.4s}
  .mvxp__spotlights .s3{right:8%;background:radial-gradient(circle,rgba(178,116,255,.55),transparent 70%);animation-delay:2.8s}
  @keyframes breathe{0%,100%{opacity:.34}50%{opacity:.6}}
  canvas.mvxp__particles{position:absolute;inset:0;z-index:-1;pointer-events:none}

  /* ---------- Header ---------- */
  .mvxp__head{text-align:center;width:100%;max-width:min(1720px,94vw)}
  .mvxp__eyebrow{
    font-family:"Orbitron",sans-serif;font-weight:600;font-size:clamp(.6rem,.78vw,.72rem);letter-spacing:.42em;
    text-transform:uppercase;color:var(--muted);margin-bottom:.7rem;
    display:inline-flex;align-items:center;gap:.7rem;
  }
  .mvxp__eyebrow::before,.mvxp__eyebrow::after{content:"";width:30px;height:1px;background:linear-gradient(90deg,transparent,var(--muted))}
  .mvxp__eyebrow::after{transform:scaleX(-1)}

  .mvxp__title{
    font-family:"Orbitron",sans-serif;font-weight:800;line-height:1.04;
    font-size:clamp(1.3rem,3.05vw,3.4rem);letter-spacing:.005em;white-space:nowrap;
    background:linear-gradient(180deg,#ffffff 0%,#cdd9f4 55%,#86a0d4 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 60px rgba(120,170,255,.18);
  }
  .mvxp__title .accent{
    background:linear-gradient(90deg,var(--cyan),var(--amber) 52%,var(--violet));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .mvxp__sub{
    margin:.7rem auto 0;color:var(--muted);white-space:nowrap;
    font-size:clamp(.78rem,1.35vw,1.12rem);line-height:1.5;font-weight:400;
  }

  /* ---------- Card row ---------- */
  .mvxp__cards{
    --gap:clamp(1rem,2vw,2.1rem);
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:var(--gap);
    width:100%;max-width:min(1680px,95vw);
    justify-content:center;
    perspective:2600px;
  }

  .card{
    position:relative;aspect-ratio:1/1;border:0;background:none;padding:0;cursor:pointer;
    border-radius:26px;outline:none;
    transition:transform .55s var(--ease),opacity .55s var(--ease),filter .55s var(--ease);
    --glow:var(--cyan);--glow-2:var(--cyan-2);
  }
  .card[data-theme="amber"]{--glow:var(--amber);--glow-2:var(--amber-2)}
  .card[data-theme="violet"]{--glow:var(--violet);--glow-2:var(--violet-2)}
  .card:hover{transform:translateY(-12px)}
  .card:focus-visible{box-shadow:0 0 0 3px rgba(255,255,255,.85),0 0 0 7px var(--glow)}

  .mvxp__cards.has-open .card:not(.is-flipped){opacity:.4;filter:saturate(.7) brightness(.8)}
  .mvxp__cards.has-open .card:not(.is-flipped):hover{opacity:.62}

  .card__inner{
    position:relative;width:100%;height:100%;border-radius:26px;
    transform-style:preserve-3d;
    transition:transform .85s var(--ease);
  }
  .card.is-flipped .card__inner{transform:rotateY(180deg)}

  .card__face{
    position:absolute;inset:0;border-radius:26px;overflow:hidden;
    backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border:1px solid color-mix(in srgb,var(--glow) 55%,transparent);
    box-shadow:
      0 0 0 1px rgba(255,255,255,.04) inset,
      0 18px 50px rgba(0,0,0,.55),
      0 0 34px color-mix(in srgb,var(--glow) 30%,transparent);
  }

  .card__front{background:#05070f}
  .card__img{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;
    transition:transform .7s var(--ease);
  }
  .card:hover .card__img{transform:scale(1.06)}

  .card__prompt{
    position:absolute;left:50%;bottom:12%;transform:translate(-50%,12px);
    display:inline-flex;align-items:center;gap:.5rem;
    padding:.5rem .95rem;border-radius:999px;white-space:nowrap;
    font-size:clamp(.7rem,.95vw,.82rem);font-weight:600;letter-spacing:.02em;color:#fff;
    background:rgba(6,10,20,.55);border:1px solid color-mix(in srgb,var(--glow) 60%,transparent);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    box-shadow:0 0 22px color-mix(in srgb,var(--glow) 45%,transparent);
    opacity:0;transition:opacity .4s var(--ease),transform .4s var(--ease);
  }
  .card__prompt .dot{width:7px;height:7px;border-radius:50%;background:var(--glow);box-shadow:0 0 10px var(--glow)}
  .card:hover .card__prompt,.card:focus-visible .card__prompt{opacity:1;transform:translate(-50%,0)}
  .card.is-flipped .card__prompt{opacity:0}

  .card__back{
    transform:rotateY(180deg);
    display:flex;flex-direction:column;
    padding:clamp(1.2rem,2.2vw,2.2rem);
    background:
      radial-gradient(130% 100% at 50% 0%, color-mix(in srgb,var(--glow) 16%,transparent), transparent 60%),
      linear-gradient(160deg,rgba(15,21,38,.92),rgba(7,10,20,.96));
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  }
  .card__back::before{
    content:"";position:absolute;inset:0;border-radius:26px;pointer-events:none;
    background:linear-gradient(135deg,color-mix(in srgb,var(--glow) 10%,transparent),transparent 40%);
  }
  .card__icon{
    width:clamp(48px,3.4vw,60px);height:clamp(48px,3.4vw,60px);border-radius:15px;display:grid;place-items:center;
    font-size:clamp(1.4rem,1.9vw,1.7rem);
    background:color-mix(in srgb,var(--glow) 14%,rgba(255,255,255,.02));
    border:1px solid color-mix(in srgb,var(--glow) 45%,transparent);
    box-shadow:0 0 22px color-mix(in srgb,var(--glow) 30%,transparent);
  }
  .card__kicker{
    margin-top:clamp(.9rem,1.6vw,1.4rem);font-family:"Orbitron",sans-serif;font-size:clamp(.58rem,.78vw,.66rem);font-weight:600;
    letter-spacing:.34em;text-transform:uppercase;color:var(--glow);
  }
  .card__title{
    margin-top:.5rem;font-family:"Orbitron",sans-serif;font-weight:700;
    font-size:clamp(1.05rem,1.85vw,1.55rem);line-height:1.2;color:#fff;
  }
  .card__body{
    margin-top:clamp(.7rem,1.3vw,1.1rem);color:var(--muted);font-size:clamp(.86rem,1.25vw,1.05rem);line-height:1.55;
  }
  .card__evidence{margin-top:auto;padding-top:1.1rem}
  .card__evlabel{display:block;font-size:clamp(.68rem,.95vw,.78rem);color:#7e8aa4;margin-bottom:.55rem;letter-spacing:.01em}
  .card__link{
    display:inline-flex;align-items:center;gap:.45rem;
    font-family:"Orbitron",sans-serif;font-weight:600;font-size:clamp(.72rem,1vw,.82rem);letter-spacing:.04em;
    color:var(--glow);text-decoration:none;
    padding:.55rem .95rem;border-radius:10px;
    border:1px solid color-mix(in srgb,var(--glow) 45%,transparent);
    background:color-mix(in srgb,var(--glow) 8%,transparent);
    transition:background .3s var(--ease),box-shadow .3s var(--ease),transform .3s var(--ease);
  }
  .card__link:hover{
    background:color-mix(in srgb,var(--glow) 20%,transparent);
    box-shadow:0 0 22px color-mix(in srgb,var(--glow) 40%,transparent);
    transform:translateX(2px);
  }

  /* ---------- Hint line ---------- */
  .mvxp__hint{
    position:relative;font-size:clamp(.82rem,1.4vw,1.05rem);color:#c7d2ea;font-weight:500;letter-spacing:.02em;
    padding-bottom:.85rem;text-align:center;
  }
  .mvxp__hint::after{
    content:"";position:absolute;left:50%;bottom:0;transform:translateX(-50%);
    width:min(300px,70vw);height:2px;border-radius:2px;
    background:linear-gradient(90deg,transparent,var(--cyan),var(--amber),var(--violet),transparent);
    box-shadow:0 0 16px rgba(120,180,255,.5);
    animation:flow 4s linear infinite;background-size:200% 100%;
  }
  @keyframes flow{from{background-position:200% 0}to{background-position:-200% 0}}

  /* ---------- Desktop: fit one 16:9 viewport, height-aware cards ---------- */
  @media (min-width:861px){
    .mvxp{height:100vh;min-height:560px}
    .mvxp__cards{
      --reserve:clamp(220px,30vh,360px);
      grid-template-columns:repeat(3, min( calc((100% - 2*var(--gap)) / 3), calc(100vh - var(--reserve)) ));
    }
  }

  /* ---------- Mobile: stack, allow wrap & scroll ---------- */
  @media (max-width:860px){
    .mvxp{min-height:100vh;height:auto}
    .mvxp__cards{grid-template-columns:1fr;max-width:440px;gap:1.5rem}
    .mvxp__title{white-space:normal;font-size:clamp(1.55rem,7vw,2.4rem)}
    .mvxp__sub{white-space:normal;font-size:clamp(.9rem,3.6vw,1.05rem);max-width:34rem}
    .mvxp__spotlights span{width:60vw}
  }

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.18s !important}
    .card__inner{transition-duration:.25s !important}
  }
</style>
</head>
<body>

  <div class="mvxp__grid" aria-hidden="true"></div>
  <div class="mvxp__spotlights" aria-hidden="true"><span class="s1"></span><span class="s2"></span><span class="s3"></span></div>

  </header>

<script>
(function(){
  var cards = Array.prototype.slice.call(document.querySelectorAll('.card'));
  var wrap = document.getElementById('cards');

  function syncState(){
    var anyOpen = cards.some(function(c){return c.classList.contains('is-flipped');});
    wrap.classList.toggle('has-open', anyOpen);
  }
  function closeAll(){
    cards.forEach(function(c){ c.classList.remove('is-flipped'); c.setAttribute('aria-pressed','false'); });
    syncState();
  }
  function flip(card){
    var willOpen = !card.classList.contains('is-flipped');
    closeAll();
    if(willOpen){ card.classList.add('is-flipped'); card.setAttribute('aria-pressed','true'); }
    syncState();
  }
  cards.forEach(function(card){ card.addEventListener('click', function(){ flip(card); }); });
  document.addEventListener('keydown', function(e){ if(e.key === 'Escape') closeAll(); });

  /* ---------- Ambient particles + light trails ---------- */
  var canvas = document.querySelector('.mvxp__particles');
  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(canvas && !reduce){
    var ctx = canvas.getContext('2d');
    var w,h,dpr,particles,trails;
    var palette = ['58,214,239','246,183,60','178,116,255'];
    function rand(a,b){return a+Math.random()*(b-a);}
    function resize(){
      dpr = Math.min(window.devicePixelRatio||1, 2);
      w = canvas.clientWidth; h = canvas.clientHeight;
      canvas.width = w*dpr; canvas.height = h*dpr;
      ctx.setTransform(dpr,0,0,dpr,0,0);
      init();
    }
    function init(){
      var n = Math.round(Math.min(70, (w*h)/26000));
      particles = [];
      for(var i=0;i<n;i++){
        particles.push({x:rand(0,w),y:rand(0,h),r:rand(.6,2.2),vy:rand(-.18,-.5),vx:rand(-.12,.12),a:rand(.15,.65),c:palette[(Math.random()*palette.length)|0],tw:rand(.005,.02),tp:rand(0,Math.PI*2)});
      }
      trails = [];
      for(var j=0;j<4;j++){ trails.push({y:rand(.2,.8)*h,x:rand(-.3,1)*w,len:rand(120,260),v:rand(.4,1.1),c:palette[j%palette.length]}); }
    }
    function draw(){
      ctx.clearRect(0,0,w,h);
      for(var t=0;t<trails.length;t++){
        var tr=trails[t]; tr.x += tr.v;
        if(tr.x - tr.len > w){ tr.x = -tr.len; tr.y = rand(.15,.85)*h; }
        var g = ctx.createLinearGradient(tr.x-tr.len,tr.y,tr.x,tr.y);
        g.addColorStop(0,'rgba('+tr.c+',0)'); g.addColorStop(1,'rgba('+tr.c+',.5)');
        ctx.strokeStyle=g; ctx.lineWidth=1.4; ctx.beginPath();
        ctx.moveTo(tr.x-tr.len,tr.y); ctx.lineTo(tr.x,tr.y); ctx.stroke();
      }
      for(var i=0;i<particles.length;i++){
        var p=particles[i];
        p.x+=p.vx; p.y+=p.vy; p.tp+=p.tw;
        if(p.y < -10){p.y=h+10; p.x=rand(0,w);}
        if(p.x < -10) p.x=w+10; if(p.x>w+10) p.x=-10;
        var al=p.a*(0.55+0.45*Math.sin(p.tp));
        ctx.beginPath();
        ctx.fillStyle='rgba('+p.c+','+al.toFixed(3)+')';
        ctx.shadowBlur=8; ctx.shadowColor='rgba('+p.c+',.9)';
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      }
      ctx.shadowBlur=0;
      requestAnimationFrame(draw);
    }
    window.addEventListener('resize', resize);
    resize(); draw();
  }
})();
</script>
